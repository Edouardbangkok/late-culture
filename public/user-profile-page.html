<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | Late Culture Bangkok</title>
    <meta property="og:title" content="User Profile | Late Culture Bangkok">
    <meta property="og:description" content="View a Late Culture member profile, badges, and recent visits.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lateculture.com/u">
    <meta property="og:site_name" content="Late Culture">
    <meta name="description" content="View a Late Culture member profile, badges, and recent visits.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Fraunces:ital,wght@1,300;1,400&family=Indie+Flower&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/glass.css">
    <link rel="stylesheet" href="/css/nav.css">
    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <link rel="stylesheet" href="/css/photo-identity.css">

    <style>
        .up-hero { background: var(--ink, #1A1010); padding: 140px 0 60px; }
        .up-hero__inner { max-width: 1200px; margin: 0 auto; padding: 0 40px; display: flex; align-items: center; gap: 32px; }
        .up-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(212,120,138,0.5); flex-shrink: 0; }
        .up-avatar-ph { width: 100px; height: 100px; border-radius: 50%; background: var(--rose3); color: #fff; display: flex; align-items: center; justify-content: center; font-family: 'Anton', sans-serif; font-size: 40px; flex-shrink: 0; }
        .up-info { flex: 1; }
        .up-name { font-family: 'Anton', Impact, sans-serif; font-size: clamp(28px, 5vw, 44px); text-transform: uppercase; color: #fff; margin: 0; line-height: 1; }
        .up-taste { font-family: 'Fraunces', serif; font-style: italic; font-size: 16px; color: #D4788A; margin-top: 6px; }
        .up-level { display: inline-flex; align-items: center; gap: 10px; margin-top: 12px; padding: 6px 16px; background: rgba(212,120,138,0.12); border: 1px solid rgba(212,120,138,0.25); border-radius: 999px; }
        .up-level__text { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; color: #D4788A; }
        .up-level__xp { font-family: 'Inter', sans-serif; font-size: 11px; color: rgba(255,255,255,0.4); }
        .up-og { display: inline-block; margin-left: 12px; padding: 4px 10px; background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.3); border-radius: 999px; font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 600; color: #FFD700; letter-spacing: 0.06em; }

        .up-stats { max-width: 1200px; margin: -30px auto 0; padding: 0 40px; display: flex; }
        .up-stat { flex: 1; text-align: center; padding: 28px 0; background: #fff; border: 1px solid rgba(212,120,138,0.1); }
        .up-stat:first-child { border-radius: 16px 0 0 16px; }
        .up-stat:last-child { border-radius: 0 16px 16px 0; }
        .up-stat:not(:last-child) { border-right: none; }
        .up-stat__num { display: block; font-family: 'Anton', sans-serif; font-size: 36px; color: var(--ink); }
        .up-stat__label { font-family: 'Inter', sans-serif; font-size: 11px; color: var(--lite); text-transform: uppercase; letter-spacing: 0.08em; }

        .up-content { max-width: 1200px; margin: 0 auto; padding: 48px 40px 80px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .up-section__title { font-family: 'Anton', sans-serif; font-size: 14px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--mid); margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .up-section__title::after { content: ''; flex: 1; height: 1px; background: rgba(212,120,138,0.15); }

        .up-badges { display: flex; flex-wrap: wrap; gap: 8px; }
        .up-badge { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: #fff; border: 1px solid rgba(212,120,138,0.12); border-radius: 999px; }
        .up-badge__icon { font-size: 18px; }
        .up-badge__name { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; color: var(--ink); }

        .up-visit { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(212,120,138,0.08); font-family: 'Inter', sans-serif; font-size: 13px; }
        .up-visit__name { color: var(--ink); }
        .up-visit__type { font-size: 11px; color: var(--lite); text-transform: uppercase; letter-spacing: 0.06em; }

        .up-empty { font-family: 'Fraunces', serif; font-style: italic; font-size: 14px; color: var(--lite); }
        .up-loading { text-align: center; padding: 200px 0; font-family: 'Inter', sans-serif; color: var(--lite); }
        .up-notfound { text-align: center; padding: 200px 40px; }
        .up-notfound__title { font-family: 'Anton', sans-serif; font-size: 32px; text-transform: uppercase; color: var(--ink); }
        .up-notfound__sub { font-family: 'Fraunces', serif; font-style: italic; color: var(--lite); margin-top: 8px; }

        .up-follow-btn {
            padding: 10px 28px;
            border: 1.5px solid rgba(212,120,138,0.4);
            border-radius: 999px;
            background: transparent;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #D4788A;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }
        .up-follow-btn:hover { background: rgba(212,120,138,0.08); }
        .up-follow-btn--active {
            background: #D4788A;
            color: #fff;
            border-color: #D4788A;
        }
        .up-follow-btn--active:hover { background: #c06878; }
        .up-follow-counts {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        .up-follow-counts strong { color: #fff; font-weight: 600; }
        .up-highlight {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-size: 13px;
            color: var(--rose3);
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .up-hero { padding: 120px 0 40px; }
            .up-hero__inner { padding: 0 24px; gap: 20px; }
            .up-avatar, .up-avatar-ph { width: 72px; height: 72px; }
            .up-stats { padding: 0 24px; margin-top: -20px; }
            .up-stat__num { font-size: 24px; }
            .up-content { grid-template-columns: 1fr; padding: 32px 24px 60px; gap: 24px; }
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="canonical" href="https://lateculture.com/u">
</head>
<body>

    <nav class="glass-nav">
        <div class="glass-nav__inner">
            <div class="nav__wordmark-wrap" style="position:relative;">
                <a href="/" class="nav__wordmark" style="text-decoration:none;display:inline-flex;align-items:center;"><img src="/assets/logo-lateculture-dark.svg" alt="Late Culture Bangkok" style="height:18px;width:auto;"></a>
            </div>
            <div class="glass-nav__links" style="position:absolute;left:50%;transform:translateX(-50%);">
                <a href="/stay" class="glass-nav__link">Stay</a>
                <a href="/eat" class="glass-nav__link">Eat</a>
                <a href="/drink" class="glass-nav__link">Drink</a>
                <a href="/party" class="glass-nav__link">Party</a>
            </div>
            <a href="/feed" class="glass-nav__cta" style="margin-left:auto;padding:8px 20px;background:#d4788a;border:none;border-radius:50px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#fff;text-decoration:none;transition:all .3s;white-space:nowrap;">My Feed</a>
            <button class="glass-nav__hamburger" onclick="document.getElementById('mobile-menu').classList.toggle('open')"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <div id="up-loading" class="up-loading">Loading profile...</div>
    <div id="up-notfound" class="up-notfound" style="display:none;">
        <h1 class="up-notfound__title">User Not Found</h1>
        <p class="up-notfound__sub">This profile does not exist.</p>
    </div>
    <div id="up-content" style="display:none;">
        <section class="up-hero">
            <div class="up-hero__inner">
                <div id="up-avatar"></div>
                <div class="up-info">
                    <h1 class="up-name" id="up-name"></h1>
                    <p class="up-taste" id="up-taste"></p>
                    <div class="up-level">
                        <span class="up-level__text" id="up-level"></span>
                        <span class="up-level__xp" id="up-xp"></span>
                    </div>
                    <span class="up-og" id="up-og" style="display:none;">OG Member</span>
                    <button class="up-follow-btn" id="up-follow-btn" style="display:none;"></button>
                </div>
            </div>
        </section>

        <div class="up-stats">
            <div class="up-stat"><span class="up-stat__num" id="up-saved">0</span><span class="up-stat__label">Saved</span></div>
            <div class="up-stat"><span class="up-stat__num" id="up-visited">0</span><span class="up-stat__label">Visited</span></div>
            <div class="up-stat"><span class="up-stat__num" id="up-badges-count">0</span><span class="up-stat__label">Badges</span></div>
        </div>

        <div class="up-content">
            <div>
                <div class="up-section__title">Badges</div>
                <div class="up-badges" id="up-badges"></div>
            </div>
            <div>
                <div class="up-section__title">Recent Visits</div>
                <div id="up-visits"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer__container">
            <div class="footer__brand"><h2 class="footer__wordmark">LATE CULTURE</h2><p class="footer__tagline">The city has a thousand doors. We opened the right ones.</p></div>
            <div style="border-top:1px solid rgba(255,255,255,0.1);margin-top:48px;padding-top:24px;text-align:center;color:rgba(255,255,255,0.3);font-size:13px;">&copy; 2025 Late Culture.</div>
        </div>
    </footer>

    <div class="mobile-menu" id="mobile-menu">
        <div class="mobile-menu__inner">
            <button class="mobile-menu__close" onclick="document.getElementById('mobile-menu').classList.remove('open')">&times;</button>
            <nav class="mobile-menu__nav">
                <a href="/stay" class="mobile-menu__link">Stay</a><a href="/eat" class="mobile-menu__link">Eat</a><a href="/drink" class="mobile-menu__link">Drink</a><a href="/party" class="mobile-menu__link">Party</a>
            </nav>
        </div>
    </div>

    <script>
    (async function() {
        var parts = window.location.pathname.split('/').filter(Boolean);
        var username = parts[1];
        if (!username) { showNotFound(); return; }

        try {
            var res = await fetch('/api/profile/' + username);
            var data = await res.json();
            if (data.error) { showNotFound(); return; }

            document.getElementById('up-loading').style.display = 'none';
            document.getElementById('up-content').style.display = '';
            document.title = data.profile.display_name + ' | Late Culture';

            var p = data.profile;
            var avatarEl = document.getElementById('up-avatar');
            avatarEl.innerHTML = p.avatar_url
                ? '<img src="' + p.avatar_url + '" class="up-avatar">'
                : '<div class="up-avatar-ph">' + (p.display_name || 'U').charAt(0).toUpperCase() + '</div>';

            document.getElementById('up-name').textContent = p.display_name || p.username;
            document.getElementById('up-taste').textContent = p.taste_label || 'New Explorer';
            document.getElementById('up-level').textContent = 'Level ' + p.level + ' \u00B7 ' + p.label;
            document.getElementById('up-xp').textContent = p.xp_total + ' XP';
            if (p.is_og) document.getElementById('up-og').style.display = '';

            document.getElementById('up-saved').textContent = p.venues_saved || 0;
            document.getElementById('up-visited').textContent = p.venues_visited || 0;
            document.getElementById('up-badges-count').textContent = data.badges.length;

            var badgesHtml = data.badges.length === 0
                ? '<p class="up-empty">No badges yet.</p>'
                : data.badges.map(function(b) {
                    return '<div class="up-badge"><span class="up-badge__icon">' + (b.icon || '\uD83C\uDFC6') + '</span><span class="up-badge__name">' + b.name + '</span></div>';
                }).join('');
            document.getElementById('up-badges').innerHTML = badgesHtml;

            var visitsHtml = data.recentVisits.length === 0
                ? '<p class="up-empty">No visits yet.</p>'
                : data.recentVisits.map(function(v) {
                    var highlight = v.highlight ? '<div class="up-highlight">"' + v.highlight + '"</div>' : '';
                    return '<div class="up-visit"><div><span class="up-visit__name">' + v.venue_name + '</span>' + highlight + '</div><span class="up-visit__type">' + v.venue_type + '</span></div>';
                }).join('');
            document.getElementById('up-visits').innerHTML = visitsHtml;

            // Follow system
            try {
                var followRes = await fetch('/api/community/follow?username=' + username, { credentials: 'same-origin' });
                var followData = await followRes.json();

                // Show follow button (only if logged in and not own profile)
                if (!followData.error) {
                    var followBtn = document.getElementById('up-follow-btn');
                    followBtn.style.display = '';
                    var isFollowing = followData.isFollowing;

                    function updateFollowBtn() {
                        if (isFollowing) {
                            followBtn.textContent = 'Following';
                            followBtn.classList.add('up-follow-btn--active');
                        } else {
                            followBtn.textContent = 'Follow';
                            followBtn.classList.remove('up-follow-btn--active');
                        }
                    }
                    updateFollowBtn();

                    followBtn.addEventListener('click', function() {
                        isFollowing = !isFollowing;
                        updateFollowBtn();
                        fetch('/api/community/follow', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: username }),
                        });
                    });
                }
            } catch(e) {}

        } catch (err) { showNotFound(); }

        function showNotFound() {
            document.getElementById('up-loading').style.display = 'none';
            document.getElementById('up-notfound').style.display = '';
        }
    })();
    </script>
    <script src="/js/auth-nav.js"></script>
</body>
</html>
