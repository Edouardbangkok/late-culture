<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Two cocktail glasses clinking — date night -->
  <g fill="none" stroke="#D4788A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left glass -->
    <path d="M22 56 L30 32 L38 56" />
    <line x1="30" y1="56" x2="30" y2="66" />
    <line x1="24" y1="66" x2="36" y2="66" />
    <line x1="22" y1="38" x2="38" y2="38" />
    <!-- Right glass -->
    <path d="M42 56 L50 32 L58 56" />
    <line x1="50" y1="56" x2="50" y2="66" />
    <line x1="44" y1="66" x2="56" y2="66" />
    <line x1="42" y1="38" x2="58" y2="38" />
    <!-- Clink sparkle -->
    <circle cx="40" cy="28" r="2" fill="#D4788A" stroke="none" />
    <line x1="40" y1="20" x2="40" y2="23" />
    <line x1="34" y1="24" x2="36" y2="26" />
    <line x1="46" y1="24" x2="44" y2="26" />
  </g>
</svg>
