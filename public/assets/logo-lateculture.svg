<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Line gradient: rose to dark purple -->
    <linearGradient id="lineGradL" x1="0.5" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a0b0"/>
      <stop offset="100%" stop-color="#5a2d4a"/>
    </linearGradient>
    <linearGradient id="lineGradR" x1="0.5" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8a0b0"/>
      <stop offset="100%" stop-color="#5a2d4a"/>
    </linearGradient>
    <!-- Glow behind circle -->
    <radialGradient id="glow" cx="50%" cy="24%" r="12%">
      <stop offset="0%" stop-color="#d4788a" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#d4788a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4788a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#3a1f3d"/>

  <!-- Subtle glow -->
  <circle cx="250" cy="130" r="60" fill="url(#glow)"/>

  <!-- Left leg -->
  <line x1="250" y1="130" x2="130" y2="395" stroke="url(#lineGradL)" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Right leg -->
  <line x1="250" y1="130" x2="370" y2="395" stroke="url(#lineGradR)" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Apex circle -->
  <circle cx="250" cy="130" r="14" fill="#d4788a"/>
</svg>