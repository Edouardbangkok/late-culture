<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Single seat at counter — solo dining -->
  <g fill="none" stroke="#D4788A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bar counter top -->
    <line x1="16" y1="40" x2="64" y2="40" />
    <!-- Counter front -->
    <rect x="16" y="40" width="48" height="4" rx="1" fill="rgba(212,120,138,0.08)" stroke="none" />
    <!-- Stool seat -->
    <ellipse cx="40" cy="54" rx="10" ry="3" fill="rgba(212,120,138,0.12)" />
    <!-- Stool leg -->
    <line x1="40" y1="57" x2="40" y2="68" />
    <line x1="34" y1="68" x2="46" y2="68" />
    <!-- Glass on counter -->
    <path d="M37 30 L39 40" />
    <path d="M43 30 L41 40" />
    <line x1="36" y1="30" x2="44" y2="30" />
    <circle cx="40" cy="28" r="1" fill="#D4788A" stroke="none" />
  </g>
</svg>
