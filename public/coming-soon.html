<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Late Culture. Bangkok — Coming Soon</title>
    <meta name="description" content="Late Culture is a hospitality media platform. The city has a thousand doors. We opened the right ones.">
    <meta property="og:title" content="Late Culture. Bangkok — Coming Soon">
    <meta property="og:description" content="Late Culture is a hospitality media platform. The city has a thousand doors. We opened the right ones.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lateculture.com">
    <meta property="og:site_name" content="Late Culture">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1A1010;
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }
        .cs { text-align: center; padding: 40px 24px; max-width: 600px; position: relative; z-index: 1; }
        .cs__logo {
            font-family: Impact, 'Arial Narrow Bold', 'Arial Black', sans-serif;
            font-size: clamp(48px, 10vw, 80px);
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }
        .cs__logo span { color: #D4788A; }
        .cs__badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #D4788A;
            border: 1px solid rgba(212,120,138,0.3);
            padding: 6px 20px;
            border-radius: 50px;
            margin-bottom: 40px;
        }
        .cs__tagline {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-weight: 300;
            font-size: clamp(18px, 3vw, 22px);
            color: rgba(255,255,255,0.4);
            line-height: 1.5;
            margin-bottom: 48px;
        }
        .cs__sub {
            font-size: 13px;
            color: rgba(255,255,255,0.25);
            line-height: 1.7;
            margin-bottom: 32px;
        }
        .cs__form { display: flex; gap: 0; max-width: 400px; margin: 0 auto 48px; }
        .cs__input {
            flex: 1;
            padding: 14px 18px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-right: none;
            border-radius: 50px 0 0 50px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
        }
        .cs__input::placeholder { color: rgba(255,255,255,0.25); }
        .cs__input:focus { border-color: rgba(212,120,138,0.4); }
        .cs__btn {
            padding: 14px 24px;
            background: #D4788A;
            border: 1px solid #D4788A;
            border-radius: 0 50px 50px 0;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
        }
        .cs__btn:hover { opacity: 0.85; }
        .cs__contact { font-size: 12px; color: rgba(255,255,255,0.2); }
        .cs__contact a { color: rgba(255,255,255,0.35); text-decoration: none; }
        .cs__contact a:hover { color: #D4788A; }
        .cs__toast { display: none; font-family: 'Fraunces', serif; font-style: italic; font-size: 14px; color: #D4788A; margin-top: -32px; margin-bottom: 32px; }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }
        @media (max-width: 480px) {
            .cs__form { flex-direction: column; gap: 8px; }
            .cs__input { border-radius: 50px; border-right: 1px solid rgba(255,255,255,0.1); }
            .cs__btn { border-radius: 50px; }
        }
    </style>
</head>
<body>
<div class="cs">
    <h1 class="cs__logo">LATE CULTURE<br><span>BANGKOK.</span></h1>
    <div class="cs__badge">Coming Soon</div>
    <p class="cs__tagline">The city has a thousand doors.<br>We opened the right ones.</p>
    <p class="cs__sub">A hospitality reference platform.<br>Stay. Eat. Drink. Party.</p>
    <form class="cs__form" id="nf" onsubmit="return handleN(event)">
        <input type="email" class="cs__input" id="ne" placeholder="Enter your email" required>
        <button type="submit" class="cs__btn">Notify Me</button>
    </form>
    <p class="cs__toast" id="nt">You're on the list.</p>
    <p class="cs__contact"><a href="mailto:hi@lateculture.com">hi@lateculture.com</a></p>
</div>
<script>
async function handleN(e) {
    e.preventDefault();
    var em = document.getElementById('ne').value;
    if (!em) return false;
    try { await fetch('/api/subscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: em }) }); } catch(err) {}
    document.getElementById('nf').style.display = 'none';
    document.getElementById('nt').style.display = 'block';
    return false;
}
</script>
</body>
</html>
