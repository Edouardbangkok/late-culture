<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Late Culture. Bangkok</title>
    <meta name="description" content="Late Culture is a hospitality media platform. The city has a thousand doors. We opened the right ones.">

    <!-- Open Graph -->
    <meta property="og:title" content="Late Culture. Bangkok — Coming Soon">
    <meta property="og:description" content="Late Culture is a hospitality media platform. The city has a thousand doors. We opened the right ones.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lateculture.com">
    <meta property="og:image" content="https://lateculture.com/assets/og-image.jpg">
    <meta property="og:site_name" content="Late Culture">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

    <link rel="canonical" href="https://lateculture.com">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1A1010;
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        .coming-soon {
            text-align: center;
            padding: 40px 24px;
            max-width: 600px;
            position: relative;
            z-index: 1;
        }

        .coming-soon__logo {
            font-family: Impact, 'Arial Narrow Bold', 'Arial Black', sans-serif;
            font-size: clamp(48px, 10vw, 80px);
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .coming-soon__logo span {
            color: #D4788A;
        }

        .coming-soon__badge {
            display: inline-block;
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #D4788A;
            border: 1px solid rgba(212, 120, 138, 0.3);
            padding: 6px 20px;
            border-radius: 50px;
            margin-bottom: 40px;
        }

        .coming-soon__tagline {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-weight: 300;
            font-size: clamp(18px, 3vw, 22px);
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.5;
            margin-bottom: 48px;
        }

        .coming-soon__sub {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.25);
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .coming-soon__email {
            display: flex;
            gap: 0;
            max-width: 400px;
            margin: 0 auto 48px;
        }

        .coming-soon__input {
            flex: 1;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-right: none;
            border-radius: 50px 0 0 50px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .coming-soon__input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .coming-soon__input:focus {
            border-color: rgba(212, 120, 138, 0.4);
        }

        .coming-soon__btn {
            padding: 14px 24px;
            background: #D4788A;
            border: 1px solid #D4788A;
            border-radius: 0 50px 50px 0;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .coming-soon__btn:hover { opacity: 0.85; }

        .coming-soon__contact {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
        }

        .coming-soon__contact a {
            color: rgba(255, 255, 255, 0.35);
            text-decoration: none;
            transition: color 0.2s;
        }

        .coming-soon__contact a:hover {
            color: #D4788A;
        }

        /* Subtle grain texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* Toast for form success */
        .coming-soon__toast {
            display: none;
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-size: 14px;
            color: #D4788A;
            margin-top: -32px;
            margin-bottom: 32px;
        }

        @media (max-width: 480px) {
            .coming-soon__email {
                flex-direction: column;
                gap: 8px;
            }
            .coming-soon__input {
                border-radius: 50px;
                border-right: 1px solid rgba(255,255,255,0.1);
            }
            .coming-soon__btn {
                border-radius: 50px;
                padding: 14px;
            }
        }
    </style>
</head>
<body>

<div class="coming-soon">
    <h1 class="coming-soon__logo">LATE CULTURE<br><span>BANGKOK.</span></h1>

    <div class="coming-soon__badge">Coming Soon</div>

    <p class="coming-soon__tagline">The city has a thousand doors.<br>We opened the right ones.</p>

    <p class="coming-soon__sub">A hospitality reference platform.<br>Stay. Eat. Drink. Party.</p>

    <form class="coming-soon__email" id="notify-form" onsubmit="return handleNotify(event)">
        <input type="email" class="coming-soon__input" id="notify-email" placeholder="Enter your email" required>
        <button type="submit" class="coming-soon__btn">Notify Me</button>
    </form>

    <p class="coming-soon__toast" id="notify-toast">You're on the list.</p>

    <p class="coming-soon__contact">
        <a href="mailto:hi@lateculture.com">hi@lateculture.com</a>
    </p>
</div>

<script>
async function handleNotify(e) {
    e.preventDefault();
    var email = document.getElementById('notify-email').value;
    if (!email) return false;

    try {
        await fetch('/api/subscribe', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email })
        });
    } catch(err) {}

    document.getElementById('notify-form').style.display = 'none';
    document.getElementById('notify-toast').style.display = 'block';
    return false;
}
</script>

</body>
</html>
